<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语知识点记忆工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }.unit-btn-active { background-color: #3b82f6; color: white !important; border-color: #3b82f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Supabase 配置区 -->
    <script>
        // ⚠️⚠️⚠️ 请在这里填入您的 Supabase URL 和 Anon Key ⚠️⚠️⚠️
        const SUPABASE_URL = 'https://bsbkadluhvrbxcmraour.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzYmthZGx1aHZyYnhjbXJhb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDU1NzIsImV4cCI6MjA4ODQyMTU3Mn0.xXnakiUL_JpnnXQttwhJFsoXAtvgrWHFME13_zDHIFc';
        
        // 初始化数据库连接
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log("Supabase 连接成功！");
    </script>

    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="app.navigate('home')">
                <span class="text-2xl">📚</span>
                <span class="font-bold text-lg tracking-tight text-gray-800">记忆工具</span>
            </div>
            <div class="flex gap-2 text-sm">
                <!-- 这两个按钮需要管理员权限 -->
                <button onclick="app.checkAuthAndNavigate('import')" class="px-3 py-1.5 text-gray-600 hover:bg-gray-100 rounded-md transition flex items-center gap-1">
                    <span class="text-xs">🔒</span> 批量添加
                </button>
                <button onclick="app.checkAuthAndNavigate('manage')" class="px-3 py-1.5 text-gray-600 hover:bg-gray-100 rounded-md transition flex items-center gap-1">
                    <span class="text-xs">🔒</span> 管理
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="flex-grow max-w-3xl mx-auto w-full p-4">
        
        <!-- 页面 1: 首页 (公开) -->
        <section id="page-home" class="block space-y-6 fade-in">
            <!-- 单元列表 -->
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">选择单元</h3>
                <div id="unit-list" class="flex overflow-x-auto gap-3 pb-2 hide-scrollbar">
                    <!-- JS 生成 -->
                </div>
            </div>

            <!-- 编号列表 -->
            <div class="min-h-[3rem]">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">选择练习</h3>
                <div id="section-list" class="flex flex-wrap gap-2"><span class="text-sm text-gray-400 italic pl-1">请先点击上方单元...</span>
                </div>
            </div>

            <!-- 展示卡片 -->
            <div class="relative bg-white border border-gray-200 rounded-2xl h-64 flex flex-col items-center justify-center p-6 text-center shadow-sm" id="display-box">
                <span id="current-tag" class="absolute top-3 left-3 bg-gray-100 text-gray-500 text-[10px] font-bold px-2 py-1 rounded uppercase">未选择</span>
                
                <div class="w-full space-y-4">
                    <div id="text-cn" class="text-3xl md:text-4xl font-bold text-gray-800 transition-all duration-300">准备好了吗？</div>
                    <div id="text-en" class="text-3xl md:text-4xl font-bold text-blue-600 opacity-0 transition-opacity duration-300 min-h-[2rem]">Ready?</div>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="flex justify-center gap-4 pt-2">
                <button onclick="app.startChallenge()" id="btn-start" class="flex-1 max-w-[140px] py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition transform active:scale-95">
                    开始挑战
                </button>
                <button onclick="app.stopChallenge()" id="btn-stop" class="flex-1 max-w-[140px] py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-md transition transform active:scale-95 opacity-50 cursor-not-allowed" disabled>
                    停止
                </button>
            </div>

            <div class="text-center text-xs text-gray-400 font-mono mt-4">
                进度: <span id="progress-current">0</span> / <span id="progress-total">0</span>
            </div>
        </section>


        <!-- 页面 2: 批量添加 (管理员) -->
        <section id="page-import" class="hidden space-y-6 fade-in">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">批量添加数据</h2>
                <button onclick="app.navigate('home')" class="text-sm text-gray-500 hover:text-gray-800">关闭 ✕</button>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">编号 ID</label>
                    <input type="text" id="import-id" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：U1-001">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">内容数据</label>
                    <textarea id="import-text" rows="8" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm" placeholder="格式：中文+英文 (自动识别分隔)&#10;例如：&#10;你好 hello&#10;这是一个句子 This is a sentence."></textarea>
                </div>

                <div class="flex justify-between items-center">
                    <span id="import-status" class="text-xs text-gray-500"></span>
                    <button onclick="app.processImport()" id="btn-import" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow transition">
                        执行解析并入库
                    </button>
                </div>
            </div>
        </section>


        <!-- 页面 3: 词库管理 (管理员) -->
        <section id="page-manage" class="hidden space-y-6 fade-in">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">词库管理</h2>
                <button onclick="app.navigate('home')" class="text-sm text-gray-500 hover:text-gray-800">关闭 ✕</button>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="manage-search-input" class="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-blue-500" placeholder="搜索编号，如 U1-001">
                    <button onclick="app.searchVocabulary()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">查询</button>
                </div>

                <div class="overflow-x-auto rounded-lg border border-gray-100">
                    <table class="w-full text-left text-sm text-gray-600">
                        <thead class="bg-gray-50 text-xs uppercase text-gray-500">
                            <tr>
                                <th class="px-4 py-3">中文</th>
                                <th class="px-4 py-3">英文</th>
                                <th class="px-4 py-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="manage-list" class="divide-y divide-gray-100">
                            <tr><td colspan="3" class="px-4 py-8 text-center text-gray-400">请输入编号进行查询</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section></main>

    <!-- 逻辑脚本 -->
    <script>
        // 【配置】管理员密码
        const ADMIN_PASS = 'admin888';

        const app = {
            state: {
                currentUnit: null,
                currentSection: null,
                playlist: [],
                isPlaying: false,
                stopSignal: false,
                isAdmin: false // 是否已验证管理员
            },

            init: function() {
                // 检查本地是否有已登录标记
                if (localStorage.getItem('english_tool_auth') === 'true') {
                    this.state.isAdmin = true;
                }
                this.renderUnits();
            },

            // --- 核心：权限验证与导航 ---
            checkAuthAndNavigate: function(pageId) {
                // 如果已经是管理员，直接跳转
                if (this.state.isAdmin) {
                    this.navigate(pageId);
                    return;
                }

                // 否则，弹出密码框
                const input = prompt("请输入管理员密码：");
                if (input === ADMIN_PASS) {
                    this.state.isAdmin = true;
                    localStorage.setItem('english_tool_auth', 'true'); // 记住登录状态
                    alert("验证成功！");
                    this.navigate(pageId);
                } else {
                    alert("密码错误，访问被拒绝。");
                }
            },

            navigate: function(pageId) {
                if (this.state.isPlaying) this.stopChallenge();
                document.querySelectorAll('section').forEach(el => el.classList.add('hidden'));
                const target = document.getElementById(`page-${pageId}`);
                target.classList.remove('hidden');
                target.classList.add('fade-in');
            },

            // --- 首页功能 ---
            renderUnits: function() {
                const container = document.getElementById('unit-list');
                container.innerHTML = '';
                for (let i = 1; i <= 8; i++) {
                    const btn = document.createElement('button');
                    btn.className = `flex-shrink-0 px-4 py-2 border border-gray-200 rounded-full text-sm font-medium text-gray-600 bg-white hover:bg-gray-50 transition`;
                    btn.innerText = `Unit ${i}`;
                    btn.onclick = (e) => this.selectUnit(`U${i}`, e.target);
                    container.appendChild(btn);
                }
            },

            selectUnit: async function(unit, btnEl) {
                // 样式切换
                document.querySelectorAll('#unit-list button').forEach(b => {
                    b.classList.remove('unit-btn-active', 'border-transparent');
                    b.classList.add('border-gray-200', 'text-gray-600');
                });
                btnEl.classList.remove('border-gray-200', 'text-gray-600');
                btnEl.classList.add('unit-btn-active', 'border-transparent');

                const listEl = document.getElementById('section-list');
                listEl.innerHTML = '<span class="text-sm text-gray-400">加载中...</span>';

                const { data, error } = await db
                    .from('vocabularies')
                    .select('section_id')
                    .eq('unit', unit);

                if (error) {
                    console.error(error);
                    listEl.innerHTML = '<span class="text-sm text-red-400">加载失败: ' + error.message + '</span>';
                    return;
                }

                const uniqueSections = [...new Set(data.map(i => i.section_id))].sort();
                listEl.innerHTML = '';
                if (uniqueSections.length === 0) {
                    listEl.innerHTML = '<span class="text-sm text-gray-400">暂无内容，请先去批量添加</span>';
                    return;
                }

                uniqueSections.forEach(sec => {
                    const btn = document.createElement('button');
                    btn.className = 'px-3 py-1 bg-white border border-gray-200 rounded text-sm text-gray-600 hover:border-blue-500 hover:text-blue-600 transition';
                    btn.innerText = sec;
                    btn.onclick = () => this.selectSection(sec, btn);
                    listEl.appendChild(btn);
                });
            },

            selectSection: async function(secId, btnEl) {
                // 样式
                document.querySelectorAll('#section-list button').forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'border-transparent'));
                btnEl.classList.add('ring-2', 'ring-blue-400', 'border-transparent');

                this.state.currentSection = secId;
                document.getElementById('current-tag').innerText = secId;document.getElementById('text-cn').innerText = '加载中...';
                document.getElementById('text-en').innerText = '';

                const { data, error } = await db
                    .from('vocabularies')
                    .select('*')
                    .eq('section_id', secId)
                    .order('id', { ascending: true });

                if (error) {
                    console.error(error);
                    document.getElementById('text-cn').innerText = '加载失败';
                    return;
                }

                this.state.playlist = data;document.getElementById('text-cn').innerText = `准备就绪 (${data.length}个)`;
                document.getElementById('progress-total').innerText = data.length;
                document.getElementById('progress-current').innerText = '0';
            },

startChallenge: async function() {
    if (!this.state.playlist.length) return alert('请先选择内容');
    
    this.state.isPlaying = true;
    this.state.stopSignal = false;
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-start').classList.add('opacity-50', 'cursor-not-allowed');
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('btn-stop').classList.remove('opacity-50', 'cursor-not-allowed');

    const cnEl = document.getElementById('text-cn');
    const enEl = document.getElementById('text-en');

    for (let i = 0; i < this.state.playlist.length; i++) {
        if (this.state.stopSignal) break;

        const item = this.state.playlist[i];
        document.getElementById('progress-current').innerText = i + 1;

        // 1. 确保英文完全隐藏
        enEl.classList.add('opacity-0');
        enEl.innerText = '';
        
        // 2. 显示中文
        cnEl.innerText = item.chinese;

        // 3. 等待1秒
        await this.wait(1000);
        if (this.state.stopSignal) break;

        // 4. 先设置英文内容（此时仍然是 opacity-0）
        enEl.innerText = item.english;
        
        // 5. 等待一帧，确保DOM更新完成
        await this.wait(50);
        
        // 6. 再显示英文
        enEl.classList.remove('opacity-0');
        // 7. 根据类型停留不同时间
        const waitTime = item.type === 'sentence' ? 4000 : 2000;
        await this.wait(waitTime);
    }
    
    this.stopChallenge(true);
},

            stopChallenge: function(finished = false) {
                this.state.stopSignal = true;
                this.state.isPlaying = false;
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').classList.remove('opacity-50', 'cursor-not-allowed');
                document.getElementById('btn-stop').disabled = true;
                document.getElementById('btn-stop').classList.add('opacity-50', 'cursor-not-allowed');
                
                if (finished) {
                    document.getElementById('text-cn').innerText = "完成！";
                    document.getElementById('text-en').innerText = "Done";
                }
            },

            wait: ms => new Promise(r => setTimeout(r, ms)),

            // --- 批量导入 (已加锁) ---
            processImport: async function() {
                const idStr = document.getElementById('import-id').value.trim();
                const textStr = document.getElementById('import-text').value;
                const statusEl = document.getElementById('import-status');
                
                if (!idStr || !textStr) return alert('请填写完整');
                
                const unitMatch = idStr.match(/^(U\d+)/i);
                if (!unitMatch) return alert('编号格式需为 U数字-xxx，如 U1-001');
                const unit = unitMatch[1].toUpperCase();

                statusEl.innerText = "处理中...";
                const lines = textStr.split('\n');
                let count = 0;

                for (let line of lines) {
                    if (!line.trim()) continue;
                    const match = line.match(/[a-zA-Z]/);
                    if (!match) continue;

                    const splitIdx = match.index;
                    const cn = line.substring(0, splitIdx).trim();
                    const en = line.substring(splitIdx).trim();
                    const type = en.split(/\s+/).length > 3 ? 'sentence' : 'word';

                    const { error } = await db.from('vocabularies').insert({
                        unit, section_id: idStr, chinese: cn, english: en, type
                    });
                    
                    if (!error) count++;
                    else console.error("Insert error:", error);
                }
                
                statusEl.innerText = `成功导入 ${count} 条数据`;
                statusEl.className = "text-xs text-green-600 font-bold";
                if(count > 0) document.getElementById('import-text').value = '';
                
                alert(`导入完成！成功 ${count} 条。`);
            },

            // --- 词库管理 (已加锁) ---
            searchVocabulary: async function() {
                const q = document.getElementById('manage-search-input').value.trim();
                const tbody = document.getElementById('manage-list');
                if (!q) return alert('请输入编号');

                tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center">搜索中...</td></tr>';
                
                const { data, error } = await db.from('vocabularies')
                    .select('*').eq('section_id', q).order('id');

                if (error) {
                    console.error(error);
                    tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-red-400">查询失败</td></tr>';
                    return;
                }

                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-400">无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 border-b border-gray-50 last:border-0";
                    tr.innerHTML = `
                        <td class="px-4 py-3">${item.chinese}</td>
                        <td class="px-4 py-3 text-blue-600 font-medium">${item.english}</td>
                        <td class="px-4 py-3 text-right">
                            <button onclick="app.deleteItem(${item.id})" class="text-red-500 hover:text-red-700 text-xs font-bold border border-red-200 px-2 py-1 rounded">删除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            },

            deleteItem: async function(id) {
                if(!confirm("确定删除？")) return;
                const { error } = await db.from('vocabularies').delete().eq('id', id);
                if (error) {
                    console.error(error);
                    alert('删除失败');
                    return;
                }
                this.searchVocabulary();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
