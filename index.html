<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语知识点记忆工具 (高级版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-unit { background-color: #2563eb; color: white; border-color: #2563eb; }
        .unit-btn { white-space: nowrap; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <!-- Supabase 配置区域 -->
    <script>
        // ================================================
        // ⚠️ 第一步：在这里填入你的 Supabase 网址和密钥
        // ================================================
        const supabaseUrl = 'https://bsbkadluhvrbxcmraour.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzYmthZGx1aHZyYnhjbXJhb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDU1NzIsImV4cCI6MjA4ODQyMTU3Mn0.xXnakiUL_JpnnXQttwhJFsoXAtvgrWHFME13_zDHIFc'; 
        // ================================================

        // 初始化连接
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow p-4 sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700 flex items-center gap-2">
                🚀 记忆挑战工具
            </h1>
            <div class="space-x-1">
                <button onclick="switchPage('home')" class="px-3 py-2 text-sm font-medium rounded hover:bg-gray-100 transition">挑战模式</button>
                <button onclick="switchPage('import')" class="px-3 py-2 text-sm font-medium rounded hover:bg-gray-100 text-blue-600 transition">📥 批量录入</button>
                <button onclick="switchPage('manage')" class="px-3 py-2 text-sm font-medium rounded hover:bg-gray-100 text-gray-600 transition">⚙️ 管理</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">

        <!-- 页面 1: 首页 (刷单词/挑战) -->
        <div id="page-home" class="block animate-fade">
            <!-- 单元选择区 -->
            <div class="mb-6 bg-white p-4 rounded-xl shadow-sm">
                <p class="text-xs text-gray-500 mb-3 font-bold uppercase tracking-wider">Step 1: 选择单元 (Unit)</p>
                <div class="flex overflow-x-auto space-x-3 hide-scrollbar pb-1" id="unit-container">
                    <!-- JS自动生成 U1-U8 按钮 -->
                </div>
            </div>

            <!-- 编号选择区 -->
            <div class="mb-6 bg-white p-4 rounded-xl shadow-sm min-h-[80px]">
                <p class="text-xs text-gray-500 mb-3 font-bold uppercase tracking-wider">Step 2: 选择编号 (ID)</p>
                <div id="section-container" class="flex flex-wrap gap-2">
                    <span class="text-gray-400 text-sm italic">请先点击上方的单元...</span>
                </div>
            </div>

            <!-- 播放控制按钮 -->
            <div class="flex justify-center gap-6 mb-8">
                <button onclick="startChallenge()" id="btn-start" class="w-36 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full transition shadow-lg transform active:scale-95">
                    ▶ 开始播放
                </button>
                <button onclick="stopChallenge()" id="btn-stop" class="w-36 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-full transition shadow-lg opacity-50 cursor-not-allowed" disabled>
                    ⏹ 停止
                </button>
            </div>

            <!-- 单词展示卡片 -->
            <div class="relative bg-white border border-gray-200 rounded-2xl h-72 flex flex-col items-center justify-center p-8 text-center shadow-md">
                <span id="label-status" class="absolute top-4 left-4 bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded font-mono">ID: --</span>
                
                <div id="display-area" class="w-full">
                    <!-- 中文展示 (问题) -->
                    <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-6 leading-tight" id="text-cn">Ready?</h2>
                    
                    <!-- 英文展示 (答案) - 默认隐藏 -->
                    <p class="text-2xl md:text-3xl text-blue-600 font-semibold opacity-0 transition-opacity duration-500" id="text-en">Go!</p>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="text-center mt-6 text-gray-400 font-mono text-sm">
                进度: <span id="progress-current" class="text-gray-800 font-bold">0</span> / <span id="progress-total">0</span>
            </div>
        </div>

        <!-- 页面 2: 批量添加 (导入) -->
        <div id="page-import" class="hidden">
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">📥 批量添加数据</h2>
                
                <div class="grid gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">编号 ID</label>
                        <input type="text" id="import-id" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="例如：U1-001 (必须包含连字符)">
                        <p class="text-xs text-gray-400 mt-1">系统会自动识别 'U1' 为第一单元</p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">粘贴内容</label>
                        <div class="bg-blue-50 p-3 rounded-lg text-xs text-blue-600 mb-2">
                            💡 格式说明：<b>中文 + 英文</b><br>
                            例如：<code>练习书法 do calligraphy</code> 或 <code>练习书法do calligraphy</code><br>
                            系统会自动按第一个英文字母进行切割。
                        </div>
                        <textarea id="import-text" rows="12" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm leading-relaxed" placeholder="在这里粘贴..."></textarea>
                    </div>

                    <div class="flex items-center justify-between pt-4 border-t">
                        <div id="import-msg" class="text-sm font-medium text-gray-600">等待操作...</div>
                        <button onclick="processImport()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-8 rounded-lg transition shadow-md">
                            🚀 立即解析并上传
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面 3: 词库管理 (删除) -->
        <div id="page-manage" class="hidden">
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-gray-800">词库管理</h2>
                
                <div class="flex gap-3 mb-6">
                    <input type="text" id="manage-search" class="flex-1 p-3 border border-gray-300 rounded-lg outline-none focus:border-blue-500" placeholder="输入编号查询，例如 U1-001">
                    <button onclick="loadManageList()" class="bg-blue-600 text-white px-6 rounded-lg hover:bg-blue-700 font-medium">搜索</button>
                </div>

                <div class="overflow-hidden border rounded-lg">
                    <table class="min-w-full text-sm text-left text-gray-500">
                        <thead class="bg-gray-50 text-gray-700 uppercase font-bold text-xs">
                            <tr>
                                <th class="px-6 py-3">中文</th>
                                <th class="px-6 py-3">英文</th>
                                <th class="px-6 py-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="manage-tbody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="3" class="px-6 py-8 text-center text-gray-400">请搜索编号查看数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 全局状态 ---
        let currentUnit = null;
        let currentSectionId = null;
        let playList = [];
        let isPlaying = false;
        let stopSignal = false;

        // --- 初始化 ---
        window.onload = function() {
            renderUnitButtons();
        };

        // --- 导航切换 ---
        function switchPage(pageName) {
            if(isPlaying) stopChallenge(); // 切换页面时强制停止
            
            ['home', 'import', 'manage'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
            });
            document.getElementById(`page-${pageName}`).classList.remove('hidden');
        }

        // ==========================================
        // 功能模块 1: 首页逻辑 (UI & 播放)
        // ==========================================

        function renderUnitButtons() {
            const container = document.getElementById('unit-container');
            container.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                // 默认样式
                btn.className = `unit-btn px-5 py-2 border rounded-full text-sm font-bold transition duration-200 bg-white border-gray-200 text-gray-600 hover:bg-gray-50 hover:border-blue-300`;
                btn.innerText = `Unit ${i}`;
                btn.onclick = () => selectUnit(i, btn);
                container.appendChild(btn);
            }
        }

        async function selectUnit(unitNum, btnElement) {
            // 1. 样式更新
            document.querySelectorAll('#unit-container button').forEach(b => {
                b.className = `unit-btn px-5 py-2 border rounded-full text-sm font-bold transition duration-200 bg-white border-gray-200 text-gray-600`;
            });
            btnElement.className = `unit-btn px-5 py-2 border rounded-full text-sm font-bold transition duration-200 active-unit shadow-md`;
            
            // 2. 数据获取
            currentUnit = `U${unitNum}`;
            const container = document.getElementById('section-container');
            container.innerHTML = '<span class="text-blue-500 text-sm animate-pulse">正在加载目录...</span>';

            const { data, error } = await supabase
                .from('vocabularies')
                .select('section_id')
                .eq('unit', currentUnit);

            if (error) {
                container.innerHTML = `<span class="text-red-500 text-sm">加载失败: ${error.message}</span>`;
                return;
            }

            // 去重并排序
            const uniqueSections = [...new Set(data.map(item => item.section_id))].sort();
            
            container.innerHTML = '';
            if (uniqueSections.length === 0) {
                container.innerHTML = '<span class="text-gray-400 text-sm italic">该单元还没有添加内容，去"批量录入"添加一点吧！</span>';
                return;
            }

            uniqueSections.forEach(sec => {
                const btn = document.createElement('button');
                btn.className = 'bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm hover:border-blue-500 hover:text-blue-600 hover:shadow-sm transition font-medium';
                btn.innerText = sec;
                btn.onclick = () => selectSection(sec, btn);
                container.appendChild(btn);
            });
        }

        async function selectSection(secId, btnElement) {
            // 样式更新
            document.querySelectorAll('#section-container button').forEach(b => {
                b.classList.remove('ring-2', 'ring-blue-500', 'border-blue-500', 'text-blue-600');
            });
            btnElement.classList.add('ring-2', 'ring-blue-500', 'border-blue-500', 'text-blue-600');

            currentSectionId = secId;
            document.getElementById('label-status').innerText = secId;
            document.getElementById('text-cn').innerText = "加载中...";
            document.getElementById('text-en').innerText = "";

            // 获取数据
            const { data, error } = await supabase
                .from('vocabularies')
                .select('*')
                .eq('section_id', secId)
                .order('id', { ascending: true });

            if (error) {
                alert('数据加载失败');
                return;
            }

            playList = data;
            document.getElementById('text-cn').innerText = `准备就绪`;
            document.getElementById('text-en').innerText = `包含 ${playList.length} 个知识点`;
            document.getElementById('text-en').classList.remove('opacity-0');
            document.getElementById('progress-total').innerText = playList.length;
            document.getElementById('progress-current').innerText = 0;
        }

        // --- 核心播放逻辑 ---
        async function startChallenge() {
            if (!currentSectionId || playList.length === 0) {
                alert('请先选择一个有效的编号');
                return;
            }
            
            isPlaying = true;
            stopSignal = false;
            
            // 按钮状态切换
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-start').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-stop').disabled = false;
            document.getElementById('btn-stop').classList.remove('opacity-50', 'cursor-not-allowed');

            const cnEl = document.getElementById('text-cn');
            const enEl = document.getElementById('text-en');

            for (let i = 0; i < playList.length; i++) {
                if (stopSignal) break;

                const item = playList[i];
                document.getElementById('progress-current').innerText = i + 1;

                // 阶段 1: 显示中文 (提问)
                cnEl.innerText = item.chinese;
                enEl.innerText = item.english; // 预填充但隐藏
                enEl.classList.add('opacity-0');
                
                // 思考时间 (1.5秒)
                await wait(1500);
                if (stopSignal) break;

                // 阶段 2: 显示英文 (答案)
                enEl.classList.remove('opacity-0');

                // 记忆时间 (句子3秒，短语1.5秒)
                const waitTime = item.type === 'sentence' ? 3000 : 1500;
                await wait(waitTime);
            }

            // 结束处理
            stopChallenge();
            if (!stopSignal) {
                cnEl.innerText = "🎉 挑战完成！";
                enEl.innerText = "Challenge Complete";
            }
        }

        function stopChallenge() {
            stopSignal = true;
            isPlaying = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-start').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('btn-stop').classList.add('opacity-50', 'cursor-not-allowed');
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }


        // ==========================================
        // 功能模块 2: 批量录入 (原 confirmBatch 现在叫 processImport)
        // ==========================================

        async function processImport() {
            const sectionId = document.getElementById('import-id').value.trim();
            const rawText = document.getElementById('import-text').value;
            const msgBox = document.getElementById('import-msg');

            // 基础校验
            if (!sectionId) {
                alert('⚠️ 必须填写编号，例如 U1-001');
                return;
            }
            if (sectionId.indexOf('-') === -1) {
                alert('⚠️ 编号格式错误！必须包含连字符，例如 U1-001');
                return;
            }
            if (!rawText) {
                alert('⚠️ 请粘贴内容');
                return;
            }

            const unit = sectionId.split('-')[0]; // 提取 U1
            const lines = rawText.split('\n');
            
            let successCount = 0;
            let skipCount = 0;
            let errorCount = 0;

            msgBox.innerHTML = '<span class="text-blue-600">正在处理中...</span>';
            document.querySelector('button[onclick="processImport()"]').disabled = true;

            // 逐行处理
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                // 智能切割：找到第一个英文字母的位置
                const match = line.match(/[a-zA-Z]/);
                
                if (!match) {
                    console.warn('无法识别英文，跳过:', line);
                    errorCount++;
                    continue; 
                }

                const splitIndex = match.index;
                // 切割字符串
                const cn = line.substring(0, splitIndex).trim(); // 前半部分是中文
                const en = line.substring(splitIndex).trim();    // 后半部分是英文
                
                // 简单的类型判断 (有标点或较长算句子)
                const isSentence = /[.?!]$/.test(en) || en.length > 30;
                const type = isSentence ? 'sentence' : 'phrase';

                // 1. 查重 (防止重复添加)
                const { data: exist } = await supabase
                    .from('vocabularies')
                    .select('id')
                    .eq('section_id', sectionId)
                    .eq('english', en) // 只要英文相同就算重复
                    .maybeSingle();

                if (exist) {
                    skipCount++;
                    continue;
                }

                // 2. 插入数据库
                // 注意：这里需要数据库表包含: unit, section_id, chinese, english, type
                const { error } = await supabase.from('vocabularies').insert({
                    unit: unit,
                    section_id: sectionId,
                    chinese: cn,
                    english: en,
                    type: type
                });

                if (error) {
                    console.error('Insert error:', error);
                    errorCount++;
                } else {
                    successCount++;
                }
            }

            // 完成后的反馈
            msgBox.innerHTML = `
                <span class="text-green-600 font-bold">成功: ${successCount}</span> | 
                <span class="text-gray-500">重复跳过: ${skipCount}</span> | 
                <span class="text-red-500">失败/格式错: ${errorCount}</span>
            `;
            
            document.querySelector('button[onclick="processImport()"]').disabled = false;
            
            if (successCount > 0) {
                document.getElementById('import-text').value = ''; // 清空输入框
                alert(`太棒了！成功添加了 ${successCount} 条数据。`);
            }
        }


        // ==========================================
        // 功能模块 3: 词库管理 (查询与删除)
        // ==========================================

        async function loadManageList() {
            const searchId = document.getElementById('manage-search').value.trim();
            const tbody = document.getElementById('manage-tbody');
            
            tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-blue-500">正在从云端加载...</td></tr>';

            if (!searchId) {
                tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-red-500">⚠️ 请输入编号</td></tr>';
                return;
            }

            const { data, error } = await supabase
                .from('vocabularies')
                .select('*')
                .eq('section_id', searchId)
                .order('id', { ascending: true });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-500">查询出错: ${error.message}</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-gray-500">未找到该编号的数据</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-gray-900 font-medium">${item.chinese}</td>
                    <td class="px-6 py-4 text-gray-600 font-mono text-sm">${item.english}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteItem(${item.id}, '${searchId}')" class="text-red-500 hover:text-red-700 font-bold text-sm px-3 py-1 border border-red-200 rounded hover:bg-red-50 transition">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteItem(id, searchId) {
            if(!confirm('确定要永久删除这条记录吗？')) return;

            const { error } = await supabase
                .from('vocabularies')
                .delete()
                .eq('id', id);

            if (error) {
                alert('删除失败: ' + error.message);
            } else {
                loadManageList(); // 重新加载列表
            }
        }
    </script>
</body>
</html>
